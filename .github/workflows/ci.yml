name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Run parser parity regression tests
        run: python -m pytest tests/test_parity_cases.py -q
      - name: Run CLI, reporting, and export regression tests
        run: python -m pytest tests/test_edge_workspace_links.py tests/test_cli_quality_gates.py -q

  wheel-smoke:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify legacy wrapper is packaged in the wheel
        run: |
          python -c "import pathlib, zipfile; whl = next(pathlib.Path('dist').glob('*.whl')); names = set(zipfile.ZipFile(whl).namelist()); assert any(name.endswith('edge_workspace_links.py') for name in names), names"
      - name: Smoke test installed wheel CLI and wrapper
        run: python scripts/check_wheel_install.py --wheel (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName

  pyinstaller-smoke:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev] pyinstaller
      - name: Build Windows executable
        run: python -m PyInstaller --noconfirm edge-workspace-links.spec
      - name: Smoke test packaged executable
        run: python scripts/smoke_packaged_cli.py --exe dist\edge-workspace-links.exe

  rust-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Run Rust parity checks
        run: python scripts/check_rust_parity.py
